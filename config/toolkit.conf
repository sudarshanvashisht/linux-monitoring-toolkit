#!/bin/bash
# =============================================================================
# toolkit.conf — central configuration for the Linux Monitoring Toolkit
# Every script sources this file, so this is the ONLY place you should need
# to edit for day-to-day use.
# =============================================================================

# --- Paths ---
TOOLKIT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
LOG_DIR="${TOOLKIT_DIR}/logs"
REPORT_LOG="${LOG_DIR}/monitor.log"
ALERT_LOG="${LOG_DIR}/alerts.log"

# --- Services to health-check (must match exact systemd unit names) ---
# Add/remove as needed. One name per array element.
SERVICES_TO_CHECK=(
  "ssh"
  "cron"
  "nginx"
  "docker"
)

# --- Log files/directories to scan for errors ---
# Directories are scanned recursively for *.log files.
LOG_SOURCES=(
  "/var/log/syslog"
  "/var/log/auth.log"
  "/var/log/nginx"
)

# Patterns considered "bad" — extended regex, case-insensitive
ERROR_PATTERN="ERROR|CRIT|CRITICAL|FATAL|FAILED|OOM"

# --- Thresholds ---
DISK_ALERT_THRESHOLD=85     # percent used, per mounted filesystem
MEM_ALERT_THRESHOLD=90      # percent used

# --- Alerting ---
# Leave SLACK_WEBHOOK_URL empty to disable Slack alerts (script will just log locally).
SLACK_WEBHOOK_URL=""

# Leave ALERT_EMAIL empty to disable email alerts.
# Requires `mail`/`mailx` to be installed and configured on the host.
ALERT_EMAIL=""
