#!/bin/bash
# =============================================================================
# toolkit.conf — Central configuration for the Linux Monitoring Toolkit
# =============================================================================

# --- Paths ---
TOOLKIT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
LOG_DIR="${TOOLKIT_DIR}/logs"
REPORTS_DIR="${TOOLKIT_DIR}/reports"
REPORT_LOG="${LOG_DIR}/monitor.log"
ALERT_LOG="${LOG_DIR}/alerts.log"

# --- Modules Enabled ---
ENABLE_CPU_MEM=true
ENABLE_DISK=true
ENABLE_NETWORK=true
ENABLE_SERVICES=true
ENABLE_LOGS=true
ENABLE_DOCKER=true
ENABLE_KUBERNETES=true
ENABLE_SECURITY=true

# --- Services to health-check ---
SERVICES_TO_CHECK=(
  "ssh"
  "cron"
  "nginx"
  "docker"
  "containerd"
  "kubelet"
)

# --- Log sources to scan ---
LOG_SOURCES=(
  "/var/log/syslog"
  "/var/log/auth.log"
  "/var/log/nginx"
)

# Patterns considered "bad" — extended regex, case-insensitive
ERROR_PATTERN="ERROR|CRIT|CRITICAL|FATAL|FAILED|OOM"

# --- Thresholds ---
DISK_WARN_THRESHOLD=80
DISK_CRIT_THRESHOLD=95

MEM_WARN_THRESHOLD=85
MEM_CRIT_THRESHOLD=95

# --- Webhooks & Notifications ---
SLACK_WEBHOOK_URL=""
ALERT_EMAIL=""
